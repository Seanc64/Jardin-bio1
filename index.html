html,body{height:100%;overflow:hidden;font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:#1a1208;color:#f0e8d0}

/* NAV BAS */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:#1e2a0e;border-top:1px solid #3a5c28;display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:#6a8a4a;font-size:10px;font-weight:600;cursor:pointer;transition:color .15s}

/* PAGES */
#app{position:fixed;top:0;left:0;right:0;bottom:60px;overflow:hidden}
.page{position:absolute;inset:0;overflow-y:auto;display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}

/* HEADER */

.page-header p{font-size:12px;color:#8ab870;margin-top:2px}

/* AUJOURD'HUI */

.today-date{font-size:13px;color:#a8cc80;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.today-title{font-size:20px;font-weight:700;color:#e8f5d0;margin-top:4px}
.today-sub{font-size:12px;color:#7a9a5a;margin-top:3px}
.progress-bar{background:#1a3a0e;border-radius:20px;height:8px;margin-top:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#5a8c3a,#a8cc80);border-radius:20px;transition:width .4s}
.progress-label{font-size:11px;color:#8ab870;margin-top:4px}

.time-section{margin:0 12px 8px}
.time-header{display:flex;align-items:center;gap:8px;padding:10px 14px 6px}
.time-header-morn{background:#2a2010;border-radius:10px 10px 0 0;border:1px solid #4a3a20;border-bottom:none}
.time-header-eve{background:#0e1a2a;border-radius:10px 10px 0 0;border:1px solid #1a2a3a;border-bottom:none}
.time-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.time-label-morn{color:#c8a040}
.time-label-eve{color:#6090c0}

.task-item:active{background:rgba(255,255,255,.06)}
.task-item.done .task-text{text-decoration:line-through;opacity:.35}
.task-item.done .task-tag{opacity:.3}
.task-check{width:22px;height:22px;border-radius:6px;border:2px solid #5a8c3a;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:transparent}
.task-item.done .task-check{background:#3a7a2a;border-color:#3a7a2a}
.task-check svg{display:none;width:13px;height:13px}
.task-item.done .task-check svg{display:block}
.task-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.tag-arrosage{background:#0a2a4a;color:#60a8d8}
.tag-traitement{background:#0a2a0a;color:#60c050}
.tag-taille{background:#2a1a08;color:#c07030}
.tag-recolte{background:#2a0a08;color:#e06840}
.tag-sol{background:#1e1408;color:#b08040}
.tag-observation{background:#1a0a2a;color:#a060e0}
.tag-balcon{background:#081a2a;color:#50b0e0}
.tag-urgent{background:#2a0808;color:#e04040}
.task-text{font-size:13px;line-height:1.45;color:#c8d8b0;flex:1}
.task-item.done .task-text{color:#6a7a5a}

.day-info{flex:1}
.day-name{font-size:13px;font-weight:600;color:#c8d8b0}
.day-tags{font-size:11px;color:#5a7a3a;margin-top:2px}
.day-prog{font-size:11px;color:#5a8c3a;font-weight:600}
.day-prog.done-all{color:#a8cc80}
.day-chevron{color:#3a5a2a;font-size:14px}
.today-badge{background:#3a7a2a;color:#a8cc80;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.07em;margin-left:4px}

/* VUE JOUR (detail) */

.back-btn:active{background:#1a2a10}

.reset-btn{margin:10px 12px;padding:12px;background:#2a0a08;border:1px solid #6a1a10;border-radius:10px;color:#e06040;font-size:13px;font-weight:600;width:calc(100% - 24px);cursor:pointer;text-align:center}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}

</head>

  };

  var monthTasks = T[m];
  if (!monthTasks) return null;
  return monthTasks[Math.min(week, monthTasks.length-1)];
}

function getTasksForDate(date) {
  var key = date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');
  if (TASKS[key]) return TASKS[key];
  return getGenericTasks(date);
}

function renderToday() {
  var now = TODAY_DATE;
  var df = DAYS_FR[now.getDay()]+' '+now.getDate()+' '+MONTHS_FR[now.getMonth()]+' 2026';
  document.getElementById('header-date').textContent = 'Pau · '+df;

  var tasks = getTasksForDate(now);
  var dateKey = dateKey2(now);
  var html = '';

  // Hero card
  var total = tasks ? (tasks.morn.length + tasks.eve.length) : 0;
  var done = 0;
  if (tasks) {
    tasks.morn.forEach(function(t,i){ if(isDone(dateKey+'-morn-'+i)) done++; });
    tasks.eve.forEach(function(t,i){ if(isDone(dateKey+'-eve-'+i)) done++; });
  }
  var pct = total > 0 ? Math.round(done/total*100) : 0;

  html += '<div class="today-hero">';
  html += '<div class="today-date">'+DAYS_FR[now.getDay()]+' '+now.getDate()+' '+MONTHS_FR[now.getMonth()]+'</div>';
  html += '<div class="today-title">Aujourd\'hui au jardin</div>';
  html += '<div class="today-sub">'+total+' tâches · '+done+' accomplies</div>';
  html += '<div class="progress-bar"><div class="progress-fill" id="today-bar" style="width:'+pct+'%"></div></div>';
  html += '<div class="progress-label" id="today-prog">'+pct+'% accompli</div>';
  html += '</div>';

  if (tasks) {
    html += renderTimeBlock(tasks.morn, dateKey, 'morn', 'matin', '🌅', 'morn');
    html += renderTimeBlock(tasks.eve, dateKey, 'eve', 'soir', '🌙', 'eve');
    if (tasks.tip) html += '<div class="tip-box"><strong>💡 Conseil :</strong> '+tasks.tip+'</div>';
  }

  document.getElementById('today-content').innerHTML = html;
  restoreTaskStates(dateKey);
}

function renderTimeBlock(taskArr, dateKey, period, label, icon, cls) {
  var html = '<div class="time-section">';
  html += '<div class="time-header time-header-'+cls+'">';
  html += '<span style="font-size:18px">'+icon+'</span>';
  html += '<span class="time-label time-label-'+cls+'">'+label.toUpperCase()+' — '+( cls==='morn' ? 'avant 10h' : 'après 18h' )+'</span>';
  html += '</div>';
  html += '<div class="task-list task-list-'+cls+'">';
  taskArr.forEach(function(task, i) {
    var tid = dateKey+'-'+period+'-'+i;
    var done = isDone(tid);
    var doneClass = done ? ' done' : '';
    html += '<div class="task-item'+doneClass+'" id="ti-'+tid+'" onclick="toggleTaskItem(\''+tid+'\',\'today\')">';
    html += '<div class="task-check"><svg viewBox="0 0 12 10" fill="none" stroke="white" stroke-width="2"><polyline points="1,5 5,9 11,1"/></svg></div>';
    html += '<span class="task-tag tag-'+task.tag+'">'+task.tag+'</span>';
    html += '<span class="task-text">'+task.t+'</span>';
    html += '</div>';
  });
  html += '</div></div>';
  return html;
}

function toggleTaskItem(tid, context) {
  toggle(tid);
  var el = document.getElementById('ti-'+tid);
  if (el) el.classList.toggle('done', isDone(tid));
  updateTodayProgress();
  // Mettre à jour aussi dans le calendrier si visible
  var el2 = document.getElementById('ti2-'+tid);
  if (el2) el2.classList.toggle('done', isDone(tid));
}

function updateTodayProgress() {
  var dateKey = dateKey2(TODAY_DATE);
  var tasks = getTasksForDate(TODAY_DATE);
  if (!tasks) return;
  var total = tasks.morn.length + tasks.eve.length;
  var done = 0;
  tasks.morn.forEach(function(t,i){ if(isDone(dateKey+'-morn-'+i)) done++; });
  tasks.eve.forEach(function(t,i){ if(isDone(dateKey+'-eve-'+i)) done++; });
  var pct = total > 0 ? Math.round(done/total*100) : 0;
  var bar = document.getElementById('today-bar');
  var prog = document.getElementById('today-prog');
  if (bar) bar.style.width = pct+'%';
  if (prog) prog.textContent = pct+'% accompli — '+done+'/'+total+' tâches';
}

function restoreTaskStates(dateKey) {
  var d = load();
  Object.keys(d).forEach(function(tid){
    var el = document.getElementById('ti-'+tid);
    if (el) el.classList.add('done');
    var el2 = document.getElementById('ti2-'+tid);
    if (el2) el2.classList.add('done');
  });
}

// ════════════════════════════════════════
// PAGE CALENDRIER
// ════════════════════════════════════════

var calMonth = 4; // Mai = 4 (0-indexed)
var calYear = 2026;

function renderCal() {
  var html = '';
  var monthsToShow = [
    {m:4,y:2026,days:31},{m:5,y:2026,days:30},{m:6,y:2026,days:31},
    {m:7,y:2026,days:31},{m:8,y:2026,days:30},{m:9,y:2026,days:31},
    {m:10,y:2026,days:30}
  ];

  monthsToShow.forEach(function(mo) {
    html += '<div class="month-title">'+MONTHS_FR[mo.m]+' '+mo.y+'</div>';
    var startDay = mo.m === 4 ? 10 : 1; // Mai commence au 10
    for (var d = startDay; d <= mo.days; d++) {
      var date = new Date(mo.y, mo.m, d);
      var key = dateKey3(mo.y, mo.m+1, d);
      var tasks = getTasksForDate(date);
      var total = tasks ? tasks.morn.length + tasks.eve.length : 0;
      var done = 0;
      if (tasks) {
        var dk = dateKey3(mo.y, mo.m+1, d);
        tasks.morn.forEach(function(t,i){ if(isDone(dk+'-morn-'+i)) done++; });
        tasks.eve.forEach(function(t,i){ if(isDone(dk+'-eve-'+i)) done++; });
      }
      var isToday = date.getTime() === TODAY_DATE.getTime();
      var isPast = date < TODAY_DATE;
      var cls = 'day-row'+(isToday?' today-row':'')+(isPast?' past-row':'');
      var tags = tasks ? [...new Set([...tasks.morn,...tasks.eve].map(function(t){return t.tag;}))] : [];
      var icons = {arrosage:'💧',traitement:'🌿',taille:'✂️',recolte:'🧺',sol:'🪱',observation:'👁️',balcon:'🪴',urgent:'⚠️'};
      var tagStr = tags.slice(0,4).map(function(t){ return icons[t]||''; }).join(' ');
      var progStr = total > 0 ? '<span class="day-prog'+(done===total?' done-all':'')+'">'+done+'/'+total+'</span>' : '';
      var todayBadge = isToday ? '<span class="today-badge">Aujourd\'hui</span>' : '';
      html += '<div class="'+cls+'" onclick="showDayDetail('+mo.y+','+mo.m+','+d+')">';
      html += '<div class="day-num">'+d+'</div>';
      html += '<div class="day-info"><div class="day-name">'+DAYS_FR[date.getDay()]+' '+d+' '+MONTHS_FR[mo.m]+todayBadge+'</div>';
      html += '<div class="day-tags">'+tagStr+'</div></div>';
      html += progStr;
      html += '<div class="day-chevron">›</div>';
      html += '</div>';
    }
  });

  document.getElementById('cal-content').innerHTML = html;
}

function showDayDetail(y, m, d) {
  var date = new Date(y, m, d);
  var tasks = getTasksForDate(date);
  var dk = dateKey3(y, m+1, d);
  var html = '';

  html += '<div style="padding:14px 14px 4px;background:#0e1a08;border-bottom:1px solid #1e2a0e">';
  html += '<div style="font-size:18px;font-weight:700;color:#c8e090">'+DAYS_FR[date.getDay()]+' '+d+' '+MONTHS_FR[m]+' '+y+'</div>';
  html += '<div style="font-size:12px;color:#6a8a4a;margin-top:2px">Tâches du jour</div></div>';

  if (tasks) {
    html += renderTimeBlockDetail(tasks.morn, dk, 'morn', 'Matin', '🌅', 'morn');
    html += renderTimeBlockDetail(tasks.eve, dk, 'eve', 'Soir', '🌙', 'eve');
    if (tasks.tip) html += '<div class="tip-box" style="margin:12px"><strong>💡 Conseil :</strong> '+tasks.tip+'</div>';
  } else {
    html += '<div style="padding:30px;text-align:center;color:#5a7a3a;font-size:14px">Pas de tâches spécifiques ce jour.<br>Maintenir les routines habituelles.</div>';
  }

  document.getElementById('day-detail-content').innerHTML = html;
  restoreTaskStates(dk);
  showPage('day');
}

function renderTimeBlockDetail(taskArr, dateKey, period, label, icon, cls) {
  var html = '<div class="time-section">';
  html += '<div class="time-header time-header-'+cls+'">';
  html += '<span style="font-size:18px">'+icon+'</span>';
  html += '<span class="time-label time-label-'+cls+'">'+label.toUpperCase()+' — '+(cls==='morn'?'avant 10h':'après 18h')+'</span>';
  html += '</div>';
  html += '<div class="task-list task-list-'+cls+'">';
  taskArr.forEach(function(task, i) {
    var tid = dateKey+'-'+period+'-'+i;
    var done = isDone(tid);
    var doneClass2 = done ? ' done' : '';
    html += '<div class="task-item'+doneClass2+'" id="ti2-'+tid+'" onclick="toggleTaskItem(\''+tid+'\',\'cal\')">';
    html += '<div class="task-check"><svg viewBox="0 0 12 10" fill="none" stroke="white" stroke-width="2"><polyline points="1,5 5,9 11,1"/></svg></div>';
    html += '<span class="task-tag tag-'+task.tag+'">'+task.tag+'</span>';
    html += '<span class="task-text">'+task.t+'</span>';
    html += '</div>';
  });
  html += '</div></div>';
  return html;
}

function renderParcelles() {
  var html = '';
  PARCELLES.forEach(function(p) {
    html += '<div class="parcel-card">';
    html += '<div class="parcel-header">';
    html += '<div><div class="parcel-title">'+p.title+'</div><div class="parcel-sub">'+p.sub+'</div></div>';
    html += '<span class="parcel-badge">'+p.badge+'</span>';
    html += '</div>';
    html += '<div class="plant-grid">';
    p.plants.forEach(function(pl) {
      html += '<div class="plant-chip2 '+pl.cls+'" onclick="showPlant(\''+pl.id+'\',\''+pl.note+'\')">'+PLANTS_DATA[pl.id].e+' '+pl.label+'</div>';
    });
    html += '</div></div>';
  });
  document.getElementById('parcelles-content').innerHTML = html;
}

function showPlant(id, note) {
  var p = PLANTS_DATA[id];
  if (!p) return;
  document.getElementById('s-emoji').textContent = p.e;
  document.getElementById('s-name').textContent = p.n;
  document.getElementById('s-family').textContent = p.f;
  document.getElementById('s-info').innerHTML =
    '<div class="info-pill"><strong>Espacement</strong><span>'+p.esp+'</span></div>'+
    '<div class="info-pill"><strong>Soleil</strong><span>'+p.sol+'</span></div>'+
    '<div class="info-pill"><strong>Arrosage</strong><span>'+p.eau+'</span></div>'+
    '<div class="info-pill"><strong>Récolte</strong><span>'+p.rec+'</span></div>'+
    (note ? '<div class="info-pill" style="min-width:100%;background:#1a2a0e"><strong>Note</strong><span>'+note+'</span></div>' : '');
  document.getElementById('s-assoc').innerHTML =
    '<div class="assoc-title">Bonnes associations</div>'+
    '<div class="assoc-good">'+p.good.replace(/\n/g,'<br>')+'</div>'+
    (p.bad ? '<div class="assoc-title" style="margin-top:10px;color:#c05030">À éviter</div><div class="assoc-bad">'+p.bad.replace(/\n/g,'<br>')+'</div>' : '');
  document.getElementById('plant-sheet').classList.add('open');
  document.getElementById('sheet-overlay').classList.add('open');
}

function closeSheet() {
  document.getElementById('plant-sheet').classList.remove('open');
  document.getElementById('sheet-overlay').classList.remove('open');
}

// UTILITAIRES

function dateKey2(date) {
  return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');
}
function dateKey3(y, m, d) {
  return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
}
